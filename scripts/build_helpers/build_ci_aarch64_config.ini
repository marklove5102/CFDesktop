# Build Configuration for CFDesktop (Docker CI - ARM64 Cross-Compile)
# This file contains configuration for ARM64 CI builds in Docker containers
# Uses cross-compilation on x86_64 host with aarch64-linux-gnu-gcc

[cmake]
# CMake generator for Linux containers
generator=Unix Makefiles

# ARM64 cross-compilation toolchain
toolchain=linux/ci-aarch64

# Build type: Release for CI/production
build_type=Release

[paths]
# Source directory (relative to project root, use "." for root)
source=.

# ARM64 专用构建目录（与 AMD64 的 build_ci 分离）
build_dir=out/build_ci_aarch64

[options]
# Parallel jobs for compilation
jobs=16
