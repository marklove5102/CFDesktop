# Build Configuration for CFDesktop (Docker CI - ARM32 Cross-Compile)
# This file contains configuration for ARM32 CI builds in Docker containers
# Uses cross-compilation on x86_64 host with arm-linux-gnueabihf-gcc
#
# Target platform: IMX6ULL (i.MX 6UltraLite), ARM Cortex-A7

[cmake]
# CMake generator for Linux containers
generator=Unix Makefiles

# ARM32 cross-compilation toolchain (ARMHF - hard float)
toolchain=linux/ci-armhf

# Build type: Release for CI/production
build_type=Release

[paths]
# Source directory (relative to project root, use "." for root)
source=.

# ARM32 专用构建目录（与 AMD64/ARM64 的 build_ci 分离）
build_dir=out/build_ci_armhf

[options]
# Parallel jobs for compilation
jobs=16
