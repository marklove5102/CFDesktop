# Build Configuration for CFDesktop (Docker CI)
# This file contains configuration for CI builds in Docker containers

[cmake]
# CMake generator for Linux containers
# Use Unix Makefiles or Ninja for Linux builds
generator=Unix Makefiles

# Toolchain for CI builds in Docker (x86_64)
toolchain=linux/ci-x86_64

# Build type: Release for CI/production
# Debug       - No optimization (-O0), full debug info (-g)
# Release     - Maximum optimization (-O3), minimal debug info
# RelWithDebInfo - Optimization (-O2) + full debug info
build_type=Release

[paths]
# Source directory (relative to project root, use "." for root)
source=.

# Build output directory (relative to project root)
build_dir=out/build_ci

[options]
# Parallel jobs for compilation
jobs=16
